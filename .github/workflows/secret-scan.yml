name: secret-scan

# Committed-secret scan on push and PR using gitleaks (created by agent-workflows).
# False positives are managed via the committed .gitleaksignore baseline at the repo root.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so gitleaks scans full history, not just HEAD - a secret
          # removed from HEAD but still in history is the dangerous case.
          fetch-depth: 0

      # Invoke the gitleaks CLI directly rather than gitleaks/gitleaks-action@v2, which now
      # requires a paid GITLEAKS_LICENSE for organization repos and fails the job without one
      # (it is a licensing gate, not a detected secret). The CLI has no such requirement and
      # performs the same scan; it honors the committed .gitleaksignore baseline automatically.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full history)
        run: gitleaks detect --source . --no-banner --redact --verbose
