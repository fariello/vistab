[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "vistab"
version = "1.0.0"
description = "A simple module for creating ASCII tables"
authors = [
    { name = "Gabriele Fariello", email = "gfariello@fariel.com" }
]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: BSD License",
    "Operating System :: OS Independent",
]
dependencies = [
    "wcwidth",
    # "cjkwrap" # Optional, mentioned in code but can fall back to textwrap
]

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["vistab"]
