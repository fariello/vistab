# Local pre-commit hooks. Each contributor runs `pre-commit install` once; CI (secret-scan
# and the test matrix) is the enforcement backstop. See CONTRIBUTING.md.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      # Golden test fixtures and CSV test data contain SIGNIFICANT trailing whitespace and
      # exact EOF bytes (vistab pads table cells with trailing spaces); the whitespace/EOF
      # fixers must never touch them or they corrupt the baselines and break the suite.
      # Markdown uses trailing spaces for hard line breaks (matches .editorconfig).
      - id: end-of-file-fixer
        exclude: '^(tests/fixtures/|tests/data/|docs/assets/.*\.png$)'
      - id: trailing-whitespace
        exclude: '^(tests/fixtures/|tests/data/)|\.md$'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
