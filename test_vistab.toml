# Vistab Core Configuration File
# This file overrides factory defaults quietly in the background when Vistab initializes.

[vistab]
style = "light"  # Options: light, double, bold, heavy, dashed, round, markdown, etc.
padding = 1      # Integer spaces injected left and right inside cells
align = "l"      # String sequence for layout (l/c/r)
max_width = 0    # Hard limit on terminal wrap limits (0 = infinite)
max_rows = 0     # Hard limit on rendered rows (0 = infinite)
max_cols = 0     # Hard limit on rendered columns (0 = infinite)
